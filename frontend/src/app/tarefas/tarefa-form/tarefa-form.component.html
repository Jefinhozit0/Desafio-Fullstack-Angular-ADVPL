<!-- ════════════════════════════════════════════════════
     Modal principal: Tarefa
     ════════════════════════════════════════════════════ -->
<po-modal
  id="modal-tarefa"
  [p-title]="tituloModal"
  [p-hide-close]="false"
  [p-primary-action]="primaryAction"
  [p-secondary-action]="secondaryAction"
  p-size="lg"
  #modalTarefaRef
>
  <form [formGroup]="form">

    <!-- ── Seção 1: Dados da Tarefa ──────────────────────────── -->
    <div class="tf-section">
      <div class="tf-section__titulo">
        <span class="po-icon po-icon-document"></span>
        Dados da Tarefa
      </div>

      <!-- Título & Responsável (2 colunas) -->
      <div class="tf-row">
        <div style="flex: 2; min-width: 0;">
          <po-input
            id="tarefa-titulo"
            name="titulo"
            formControlName="titulo"
            p-label="Título"
            p-placeholder="Informe o título da tarefa"
            [p-maxlength]="50"
            p-required="true"
          >
          </po-input>
        </div>
        <div style="flex: 1; min-width: 0;">
          <po-input
            id="tarefa-responsavel"
            name="responsavel"
            formControlName="responsavel"
            p-label="Responsável"
            p-placeholder="Nome do responsável"
            [p-maxlength]="50"
            p-required="true"
          >
          </po-input>
        </div>
      </div>

      <!-- Descrição (largura total) -->
      <div class="tf-field">
        <po-textarea
          id="tarefa-descricao"
          name="descricao"
          formControlName="descricao"
          p-label="Descrição"
          p-placeholder="Descreva os detalhes e objetivo desta tarefa..."
          [p-required]="true"
          [p-rows]="4"
        >
        </po-textarea>
      </div>
    </div>

    <!-- ── Seção 2: Status e Datas ───────────────────────────── -->
    <div class="tf-section">
      <div class="tf-section__titulo">
        <span class="po-icon po-icon-calendar"></span>
        Status e Datas
      </div>

      <!-- Situação | Data de Inclusão | Data de Conclusão (3 colunas iguais) -->
      <div class="tf-row">
        <div class="tf-col">
          <po-select
            id="tarefa-situacao"
            name="situacao"
            formControlName="situacao"
            p-label="Situação"
            [p-options]="situacaoOptions"
            [p-required]="true"
          >
          </po-select>
        </div>
        <div class="tf-col">
          <po-datepicker
            id="tarefa-data-inclusao"
            name="dataInclusao"
            formControlName="dataInclusao"
            p-label="Data de Inclusão"
            p-placeholder="dd/mm/aaaa"
            p-required="true"
          >
          </po-datepicker>
        </div>
        <div class="tf-col">
          <po-datepicker
            id="tarefa-data-conclusao"
            name="dataConclusao"
            formControlName="dataConclusao"
            p-label="Data de Conclusão"
            p-placeholder="dd/mm/aaaa"
          >
          </po-datepicker>
        </div>
      </div>
    </div>

  </form>

  <!-- ── Seção de SubTarefas (somente no modo edição) ────────── -->
  <ng-container *ngIf="modoEdicao">
    <div class="tf-section">
      <div class="tf-section__titulo">
        <span class="po-icon po-icon-list"></span>
        Subtarefas
      </div>

      <div class="tf-subtarefas-header">
        <span class="tf-subtarefas-info">
          <strong>{{ subtarefas.length }}</strong> subtarefa(s) cadastrada(s)
        </span>
        <po-button
          id="btn-nova-subtarefa"
          p-label="Nova Subtarefa"
          p-icon="po-icon-plus"
          p-type="primary"
          p-kind="tertiary"
          (p-click)="abrirNovaSubtarefa()"
        >
        </po-button>
      </div>

      <po-table
        id="table-subtarefas"
        [p-columns]="colunasSubtarefas"
        [p-items]="subtarefas"
        [p-actions]="acoesSubtarefas"
        [p-loading]="isLoadingSubtarefas"
        [p-striped]="true"
        [p-literals]="literaisSubtarefas"
      >
      </po-table>
    </div>
  </ng-container>

</po-modal>

<!-- Modal de exclusão de subtarefa -->
<po-modal
  id="modal-excluir-subtarefa"
  p-title="Confirmar Exclusão"
  [p-primary-action]="acaoConfirmarExclusaoSubtarefa"
  [p-secondary-action]="acaoCancelarExclusaoSubtarefa"
  #modalExcluirSubtarefaRef
>
  <p>Tem certeza que deseja excluir esta subtarefa? Esta ação não pode ser desfeita.</p>
</po-modal>

<!-- Modal de subtarefa (inclusão/edição) -->
<app-subtarefa-form
  [codigoTarefa]="tarefaEdicao?.codigo ?? ''"
  [subtarefaEdicao]="subtarefaEmEdicao"
  [isOpen]="modalSubtarefaAberta"
  (fechar)="onSubtarefaFechada($event)"
>
</app-subtarefa-form>
