<po-modal
  id="modal-subtarefa"
  [p-title]="tituloModal"
  p-icon="po-icon-list"
  [p-primary-action]="primaryAction"
  [p-secondary-action]="secondaryAction"
  p-size="lg"
  #modalSubtarefaRef
>
  <div class="subtask-modal">
    <header class="subtask-modal__summary">
      <div class="subtask-modal__summary-main">
        <span class="subtask-modal__code">{{ codigoExibicao }}</span>
        <strong>{{ form.get('descricao')?.value || tituloModal }}</strong>
        <span>{{ modoEdicao ? 'Registro existente' : 'Novo registro' }}</span>
      </div>

      <span class="task-status" [ngClass]="statusAtualClasse">
        <span class="po-icon po-icon-info"></span>
        {{ statusAtualLabel }}
      </span>
    </header>

    <form [formGroup]="form">
      <section class="subtask-section">
        <div class="subtask-section__title">
          <span class="po-icon po-icon-document"></span>
          <strong>Dados da subtarefa</strong>
        </div>

        <po-input
          id="subtarefa-descricao"
          name="descricao"
          formControlName="descricao"
          p-label="Descrição"
          p-placeholder="Descreva a subtarefa"
          p-icon="po-icon-document"
          [p-maxlength]="50"
          p-required="true"
        >
        </po-input>

        <po-input
          id="subtarefa-responsavel"
          name="responsavel"
          formControlName="responsavel"
          p-label="Responsável"
          p-placeholder="Nome do responsável pela subtarefa"
          p-icon="po-icon-user"
          [p-maxlength]="50"
          p-required="true"
        >
        </po-input>
      </section>

      <section class="subtask-section">
        <div class="subtask-section__title">
          <span class="po-icon po-icon-calendar"></span>
          <strong>Status e prazo</strong>
        </div>

        <div class="subtask-grid">
          <po-select
            id="subtarefa-status"
            name="status"
            formControlName="status"
            p-label="Status"
            [p-options]="statusOptions"
            [p-required]="true"
          >
          </po-select>

          <po-datepicker
            id="subtarefa-data-conclusao"
            name="dataConclusao"
            formControlName="dataConclusao"
            p-label="Data de Conclusão"
            p-placeholder="dd/mm/aaaa"
          >
          </po-datepicker>
        </div>
      </section>
    </form>
  </div>
</po-modal>
